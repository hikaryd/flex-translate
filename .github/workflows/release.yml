name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-android:
    name: Build Android release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/android
    outputs:
      apk-name: ${{ steps.apk-name.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('apps/android/**/*.gradle.kts', 'apps/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26.1.10909125
        run: sdkmanager "ndk;26.1.10909125"

      - name: Fetch prebuilt llama.cpp arm64 libs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch_llama_prebuilt.sh

      # Decode release keystore from repo secret (base64-encoded JKS).
      # Falls back to debug signing if the secret is absent.
      - name: Decode keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "ANDROID_KEYSTORE_BASE64 secret not set — falling back to debug signing" >&2
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/apps/android/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          SIGNING_AVAILABLE: ${{ steps.keystore.outputs.present }}
        run: |
          if [ "$SIGNING_AVAILABLE" = "true" ]; then
            ./gradlew assembleRelease --no-daemon
          else
            # No keystore secret: build a debug-signed APK and rename it
            ./gradlew assembleDebug --no-daemon
            mkdir -p app/build/outputs/apk/release
            cp app/build/outputs/apk/debug/app-debug.apk \
               app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Rename APK to versioned name
        id: apk-name
        run: |
          TAG="${{ github.ref_name }}"
          APK_NAME="FlexTranslate-${TAG}.apk"
          # Find the built APK (release or fallback)
          SRC=$(find app/build/outputs/apk -name "*.apk" | head -1)
          cp "$SRC" "$APK_NAME"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: apps/android/${{ steps.apk-name.outputs.name }}

  build-ios-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-14
    defaults:
      run:
        working-directory: apps/ios
    outputs:
      ipa-name: ${{ steps.ipa-name.outputs.name }}
      ipa-built: ${{ steps.ipa-name.outputs.built }}

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Fetch sherpa-onnx xcframeworks
        run: bash scripts/fetch_sherpa_ios.sh

      - name: Fetch llama.cpp xcframework
        run: bash scripts/fetch_llama_ios.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive for generic iOS device (unsigned)
        id: archive
        run: |
          xcodebuild archive \
            -scheme FlexTranslate \
            -destination 'generic/platform=iOS' \
            -archivePath "${{ runner.temp }}/FlexTranslate.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
          && echo "success=true" >> "$GITHUB_OUTPUT" \
          || echo "success=false" >> "$GITHUB_OUTPUT"

      - name: Package unsigned IPA
        id: ipa-name
        run: |
          TAG="${{ github.ref_name }}"
          IPA_NAME="FlexTranslate-${TAG}-unsigned.ipa"
          ARCHIVE="${{ runner.temp }}/FlexTranslate.xcarchive"

          if [ "${{ steps.archive.outputs.success }}" = "true" ] && [ -d "$ARCHIVE/Products/Applications/FlexTranslate.app" ]; then
            mkdir -p /tmp/ipa-payload/Payload
            cp -R "$ARCHIVE/Products/Applications/FlexTranslate.app" /tmp/ipa-payload/Payload/
            cd /tmp/ipa-payload && zip -r "${{ github.workspace }}/apps/ios/$IPA_NAME" Payload/
            echo "name=$IPA_NAME" >> "$GITHUB_OUTPUT"
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "Archive step failed or .app not found — IPA not produced" >&2
            echo "name=" >> "$GITHUB_OUTPUT"
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload IPA artifact
        if: steps.ipa-name.outputs.built == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: apps/ios/${{ steps.ipa-name.outputs.name }}

  create-release:
    name: Create GitHub release
    needs: [build-android, build-ios-ipa]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: release-artifacts/

      - name: Download IPA (if built)
        if: needs.build-ios-ipa.outputs.ipa-built == 'true'
        uses: actions/download-artifact@v4
        with:
          name: release-ipa
          path: release-artifacts/

      - name: List artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FlexTranslate ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## FlexTranslate ${{ github.ref_name }}

            ### Installation

            **Android**: Download `FlexTranslate-${{ github.ref_name }}.apk` and sideload via Settings → Install unknown apps.

            **iOS (SideStore)**:
            1. Install [SideStore](https://sidestore.io) (one-time setup via computer).
            2. Download `FlexTranslate-${{ github.ref_name }}-unsigned.ipa` onto your iPhone.
            3. SideStore → My Apps → **"+"** → select the `.ipa`.
            4. SideStore signs it with your Apple ID and auto-renews — no 7-day expiry.

            ### Notes
            - Models are **not bundled** — download them from the Models screen inside the app.
            - Gemini Flash cloud MT requires your own API key (BYOK) — enter it in Cloud settings.
            - MiLMMT-4B uses a Gemma-derived model; [Gemma Terms of Service](https://ai.google.dev/gemma/terms) apply.

            > If the IPA is not attached, the iOS archive step encountered a signing bypass blocker.
            > The APK release is always present. See CI logs for details.
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
