name: FlexTranslate
options:
  bundleIdPrefix: dev.flextranslate
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    # Swift 6 strict-concurrency is the target the existing code was written for
    # (explicit Sendable conformances, @MainActor view model, @Sendable capture tap).
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    # Simulator-only bring-up: no signing identity required for a simulator build.
    CODE_SIGNING_ALLOWED: "NO"

targets:
  FlexTranslate:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FlexTranslate/Sources/FlexTranslate
      # SherpaOnnx.swift Swift wrapper for the C API (vendored from k2-fsa/sherpa-onnx).
      # The .xcframework binaries are gitignored; fetch via scripts/fetch_sherpa_ios.sh.
      - path: FlexTranslate/Vendor/SherpaOnnx/SherpaOnnx.swift
    info:
      path: FlexTranslate/Info.plist
      properties:
        CFBundleDisplayName: Flex Translate
        NSMicrophoneUsageDescription: Flex Translate uses the microphone for offline speech transcription.
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.flextranslate.app
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        SWIFT_STRICT_CONCURRENCY: complete
        # Bridging header exposes sherpa-onnx/c-api/c-api.h to Swift via the C API.
        SWIFT_OBJC_BRIDGING_HEADER: FlexTranslate/Vendor/SherpaOnnx/SherpaOnnx-Bridging-Header.h
        # The xcframework ships its public headers at the top-level Headers/ dir
        # (not inside a per-slice sub-folder). Both frameworks share this layout.
        HEADER_SEARCH_PATHS: "$(SRCROOT)/FlexTranslate/Vendor/SherpaOnnx/sherpa-onnx.xcframework/Headers $(SRCROOT)/FlexTranslate/Vendor/SherpaOnnx/onnxruntime.xcframework/Headers"
        # sherpa-onnx links against libc++ and needs these system libs.
        OTHER_LDFLAGS: "-lc++ -lz -framework Accelerate"
    dependencies:
      - sdk: AVFoundation.framework
      # sherpa-onnx static xcframework (device arm64 + simulator arm64/x86_64 slices).
      # Binary is gitignored; fetch via apps/ios/scripts/fetch_sherpa_ios.sh.
      - framework: FlexTranslate/Vendor/SherpaOnnx/sherpa-onnx.xcframework
        embed: false
      # onnxruntime static xcframework required by sherpa-onnx.
      - framework: FlexTranslate/Vendor/SherpaOnnx/onnxruntime.xcframework
        embed: false

  FlexTranslateTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: FlexTranslate/Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.flextranslate.tests
        GENERATE_INFOPLIST_FILE: "YES"
        # Test target needs the same header paths as the app target so the
        # bridging header (sherpa-onnx + onnxruntime) resolves correctly.
        HEADER_SEARCH_PATHS: "$(SRCROOT)/FlexTranslate/Vendor/SherpaOnnx/sherpa-onnx.xcframework/Headers $(SRCROOT)/FlexTranslate/Vendor/SherpaOnnx/onnxruntime.xcframework/Headers"
        SWIFT_OBJC_BRIDGING_HEADER: FlexTranslate/Vendor/SherpaOnnx/SherpaOnnx-Bridging-Header.h
    dependencies:
      - target: FlexTranslate

schemes:
  FlexTranslate:
    build:
      targets:
        FlexTranslate: all
        FlexTranslateTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FlexTranslateTests
